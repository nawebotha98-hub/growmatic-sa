<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found | GrowMatic SA</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/logo.png">
  <style>
    :root { --bg:#fafaf8; --ink:#0a0a0a; --gray:#6b6b68; --green:#1f9d5c; --border:#e4e4e0; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .wrap { max-width: 520px; }
    img { height: 44px; margin-bottom: 32px; }
    h1 { font-size: clamp(2.4rem, 8vw, 3.6rem); margin: 0 0 12px; letter-spacing: -0.02em; }
    p { color: var(--gray); font-size: 1.05rem; line-height: 1.6; margin: 0 0 28px; }
    .btn {
      display: inline-block; background: var(--ink); color: #fff; text-decoration: none;
      padding: 14px 26px; border-radius: 999px; font-weight: 500; transition: background .2s;
    }
    .btn:hover { background: var(--green); }
    .alt { display: block; margin-top: 20px; color: var(--gray); font-size: .95rem; }
    .alt a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="assets/logo-horizontal.png" alt="GrowMatic SA">
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <a class="btn" href="/">Back to home</a>
    <span class="alt">Need a hand? <a href="mailto:ewan@growmaticsa.com">ewan@growmaticsa.com</a></span>
  </div>
</body>
</html>
